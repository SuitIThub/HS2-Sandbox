# Inserts or refreshes per-artifact download links in README.md after grouped releases ship.
# Each release may omit unchanged module DLLs; this workflow resolves the newest release that
# actually contains each DLL via the GitHub API (not releases/latest/download/...).

name: Update README download links

on:
  workflow_run:
    workflows: ["Release plugin"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-downloads
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Refresh README download links
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          README_PATH: README.md
        run: python3 .github/scripts/update_readme_downloads.py

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README.md download links already current."
          else
            git commit -m "chore: refresh README module download links"
            git push
          fi
