# Releases plugin artifacts when a BepInEx PluginVersion constant changes in any plugin/module,
# or when this repository has no GitHub releases yet (initial publish of all artifacts).
# One GitHub Release is created per qualifying push, containing a grouped set of assets:
#   - HS2SandboxPlugin.dll (all-in-one) whenever any module or the main plugin version changed,
#     on first-ever release, or when manually forced
#   - HS2Sandbox.<Module>.dll only for modules whose PluginVersion line changed (or all modules
#     on first-ever release / force)
#
# Builds use NuGet only (IllusionLibs + BepInEx feeds via nuget.config); no local game path.

name: Release plugin

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_release:
        description: "Create a release even if no PluginVersion was bumped"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-plugin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve comparison refs
        id: refs
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            AFTER="$(git rev-parse HEAD)"
            BEFORE="$(git rev-parse HEAD~1)"
          elif [[ -z "$BEFORE" || "$BEFORE" =~ ^0+$ ]]; then
            AFTER="$(git rev-parse HEAD)"
            BEFORE="$(git rev-parse HEAD~1)"
          fi

          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after=$AFTER" >> "$GITHUB_OUTPUT"

      - name: Detect PluginVersion bumps
        id: detect
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          BEFORE="${{ steps.refs.outputs.before }}"
          AFTER="${{ steps.refs.outputs.after }}"

          FORCE="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && \
             [[ "${{ github.event.inputs.force_release }}" == "true" ]]; then
            FORCE="true"
          fi

          extract_version() {
            local ref="$1"
            local path="$2"
            git show "${ref}:${path}" 2>/dev/null | grep -oP 'PluginVersion\s*=\s*"\K[^"]+' | head -n1 || true
          }

          declare -A FILES=(
            [allinone]="HS2SandboxPlugin.cs"
            [copyscript]="Modules/CopyScript/CopyScriptModulePlugin.cs"
            [timeline]="Modules/Timeline/TimelineModulePlugin.cs"
            [searchbarmanager]="Modules/SearchBarManager/SearchBarManagerModulePlugin.cs"
            [sonscale]="Modules/SonScale/SonScaleModulePlugin.cs"
          )

          declare -A DLLS=(
            [allinone]="bin/Release/HS2SandboxPlugin.dll"
            [copyscript]="Modules/CopyScript/bin/Release/HS2Sandbox.CopyScript.dll"
            [timeline]="Modules/Timeline/bin/Release/HS2Sandbox.Timeline.dll"
            [searchbarmanager]="Modules/SearchBarManager/bin/Release/HS2Sandbox.SearchBarManager.dll"
            [sonscale]="Modules/SonScale/bin/Release/HS2Sandbox.SonScale.dll"
          )

          CHANGED=()
          NOTES=()
          CHANGELOG=()

          for key in allinone copyscript timeline searchbarmanager sonscale; do
            f="${FILES[$key]}"
            old_v="$(extract_version "$BEFORE" "$f")"
            new_v="$(extract_version "$AFTER" "$f")"
            if [[ -z "$new_v" ]]; then
              echo "::warning::Could not read PluginVersion from $f at $AFTER"
              continue
            fi
            if [[ "$old_v" != "$new_v" ]]; then
              CHANGED+=("$key")
              NOTES+=("- **${key}**: \`${old_v:-∅}\` → \`${new_v}\`")
            fi
          done

          # Human-readable changelog from commits in this release range.
          # Falls back to latest commit subject if range cannot be resolved.
          if git rev-parse "$BEFORE" >/dev/null 2>&1 && git rev-parse "$AFTER" >/dev/null 2>&1; then
            while IFS= read -r line; do
              [[ -z "${line// }" ]] && continue
              CHANGELOG+=("$line")
            done < <(git log --no-merges --pretty=format:'- %s (%h)' "${BEFORE}..${AFTER}")
          fi
          if [[ ${#CHANGELOG[@]} -eq 0 ]]; then
            fallback_subject="$(git log -1 --pretty=%s "$AFTER" 2>/dev/null || echo "Update release contents")"
            fallback_hash="$(git rev-parse --short "$AFTER" 2>/dev/null || echo "HEAD")"
            CHANGELOG+=("- ${fallback_subject} (${fallback_hash})")
          fi

          INITIAL_RELEASE="false"
          if [[ ${#CHANGED[@]} -eq 0 ]]; then
            REL_JSON=$(curl -sS -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=1")
            REL_COUNT=$(echo "$REL_JSON" | jq 'length' 2>/dev/null || echo 1)
            if [[ "$REL_COUNT" =~ ^[0-9]+$ ]] && [[ "$REL_COUNT" -eq 0 ]]; then
              INITIAL_RELEASE="true"
              echo "No GitHub releases exist on this repository yet; will publish an initial release."
            fi
          fi

          if [[ "$FORCE" != "true" && ${#CHANGED[@]} -eq 0 && "$INITIAL_RELEASE" != "true" ]]; then
            echo "No PluginVersion changes between $BEFORE and $AFTER; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$FORCE" == "true" && ${#CHANGED[@]} -eq 0 ]]; then
            CHANGED=(copyscript timeline searchbarmanager sonscale)
            NOTES+=("- **manual force**: including all module DLLs plus all-in-one")
          elif [[ "$INITIAL_RELEASE" == "true" && ${#CHANGED[@]} -eq 0 ]]; then
            CHANGED=(copyscript timeline searchbarmanager sonscale)
            NOTES+=("- **initial GitHub release**: repository had no prior releases; publishing all module DLLs plus all-in-one")
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"

          ASSETS=()
          ASSETS+=("${DLLS[allinone]}")

          for key in "${CHANGED[@]}"; do
            if [[ "$key" != "allinone" ]]; then
              ASSETS+=("${DLLS[$key]}")
            fi
          done

          UNIQUE=()
          for p in "${ASSETS[@]}"; do
            skip=false
            for u in "${UNIQUE[@]}"; do
              [[ "$u" == "$p" ]] && skip=true && break
            done
            $skip || UNIQUE+=("$p")
          done

          LIST_FILE="$GITHUB_WORKSPACE/.release-asset-paths.txt"
          printf '%s\n' "${UNIQUE[@]}" > "$LIST_FILE"
          echo "asset_list_file=$LIST_FILE" >> "$GITHUB_OUTPUT"

          {
            echo 'notes<<NOTEEOF'
            echo "### Version changes"
            if [[ ${#NOTES[@]} -gt 0 ]]; then
              printf '%s\n' "${NOTES[@]}"
            fi
            echo ""
            echo "### Artifacts"
            printf '%s\n' "${UNIQUE[@]}" | while read -r line; do
              [[ -z "$line" ]] && continue
              echo "- \`$(basename "$line")\`"
            done
            echo ""
            echo "### Changelog"
            printf '%s\n' "${CHANGELOG[@]}"
            echo 'NOTEEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Skip (no version bump)
        if: steps.detect.outputs.should_release != 'true'
        run: echo "Skipping build and release."

      - name: Check existing release for this commit
        if: steps.detect.outputs.should_release == 'true'
        id: existing
        run: |
          set -euo pipefail
          TAG="release-${{ github.sha }}"
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
          if [[ "$CODE" == "200" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (release tag already exists)
        if: steps.detect.outputs.should_release == 'true' && steps.existing.outputs.exists == 'true'
        run: echo "Tag release-${{ github.sha }} already has a GitHub release; skipping build."

      - name: Setup .NET
        if: steps.detect.outputs.should_release == 'true' && steps.existing.outputs.exists != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and build solution (Release)
        if: steps.detect.outputs.should_release == 'true' && steps.existing.outputs.exists != 'true'
        run: |
          set -euo pipefail
          dotnet restore HS2-Sandbox.sln
          dotnet build HS2-Sandbox.sln -c Release --no-incremental

      - name: Stage release files
        if: steps.detect.outputs.should_release == 'true' && steps.existing.outputs.exists != 'true'
        run: |
          set -euo pipefail
          mkdir -p release-staging
          while IFS= read -r rel || [[ -n "${rel:-}" ]]; do
            [[ -z "${rel// }" ]] && continue
            if [[ ! -f "$rel" ]]; then
              echo "::error::Expected artifact missing: $rel"
              exit 1
            fi
            cp -a "$rel" "release-staging/$(basename "$rel")"
          done < "${{ steps.detect.outputs.asset_list_file }}"

      - name: Create GitHub Release (grouped assets)
        if: steps.detect.outputs.should_release == 'true' && steps.existing.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.sha }}
          name: HS2 Sandbox — grouped release (${{ github.sha }})
          body: |
            ${{ steps.detect.outputs.notes }}

            **Commit:** ${{ github.sha }}
            **Workflow:** ${{ github.run_id }}
          files: release-staging/*
          fail_on_unmatched_files: true
          generate_release_notes: true
