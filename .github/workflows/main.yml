# Single entry point for main-branch automation:
#   - build and publish GitHub releases when PluginVersion constants bump (or on first release / manual force)
#   - workflow_dispatch "Manual rerelease": check plugins to publish, run workflow (15s wait, then release)
#   - after a successful release, refresh README download links and versions.json (badges + in-app update URLs)
#
# Bot-only commits (versions.json / README.md) do not re-trigger this workflow.

name: Main

on:
  push:
    branches: [main]
    paths-ignore:
      - "versions.json"
      - "README.md"
  workflow_dispatch:
    inputs:
      manual_rerelease:
        description: "Manual rerelease — check plugins below, wait, then publish selected DLLs"
        required: false
        default: false
        type: boolean
      rerelease_allinone:
        description: "Rerelease — All-in-one (HS2SandboxPlugin)"
        required: false
        default: false
        type: boolean
      rerelease_copyscript:
        description: "Rerelease — Copy Script"
        required: false
        default: false
        type: boolean
      rerelease_timeline:
        description: "Rerelease — Timeline"
        required: false
        default: false
        type: boolean
      rerelease_searchbarmanager:
        description: "Rerelease — Search Bar Manager"
        required: false
        default: false
        type: boolean
      rerelease_sonscale:
        description: "Rerelease — Son Scale"
        required: false
        default: false
        type: boolean
      rerelease_workspacetreelock:
        description: "Rerelease — Workspace Tree Lock"
        required: false
        default: false
        type: boolean
      rerelease_notebook:
        description: "Rerelease — Notebook"
        required: false
        default: false
        type: boolean
      rerelease_posebrowser:
        description: "Rerelease — Pose Browser"
        required: false
        default: false
        type: boolean
      force_release:
        description: "Create a release even if no PluginVersion was bumped"
        required: false
        default: false
        type: boolean
      update_readme:
        description: "Refresh README download links (without releasing)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.manual_rerelease != true)
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      notes: ${{ steps.detect.outputs.notes }}
      asset_paths: ${{ steps.detect.outputs.asset_paths }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
      release_name: ${{ steps.detect.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve comparison refs
        id: refs
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            AFTER="$(git rev-parse HEAD)"
            BEFORE="$(git rev-parse HEAD~1)"
          elif [[ -z "$BEFORE" || "$BEFORE" =~ ^0+$ ]]; then
            AFTER="$(git rev-parse HEAD)"
            BEFORE="$(git rev-parse HEAD~1)"
          fi

          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after=$AFTER" >> "$GITHUB_OUTPUT"

      - name: Detect PluginVersion bumps
        id: detect
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          FORCE="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && \
             [[ "${{ github.event.inputs.force_release }}" == "true" ]]; then
            FORCE="true"
          fi
          bash .github/scripts/detect_plugin_versions.sh \
            "${{ steps.refs.outputs.before }}" \
            "${{ steps.refs.outputs.after }}" \
            "$FORCE"

  manual-rerelease:
    if: github.event_name == 'workflow_dispatch' && inputs.manual_rerelease == true
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      notes: ${{ steps.detect.outputs.notes }}
      asset_paths: ${{ steps.detect.outputs.asset_paths }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
      release_name: ${{ steps.detect.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for plugin selections to register
        run: |
          set -euo pipefail
          echo "Manual rerelease: enable the plugins you want, then run this workflow."
          echo "Waiting 15 seconds before starting the rerelease..."
          sleep 15

      - name: Collect selected plugins
        id: plugins
        env:
          RERELEASE_ALLINONE: ${{ inputs.rerelease_allinone }}
          RERELEASE_COPYSCRIPT: ${{ inputs.rerelease_copyscript }}
          RERELEASE_TIMELINE: ${{ inputs.rerelease_timeline }}
          RERELEASE_SEARCHBARMANAGER: ${{ inputs.rerelease_searchbarmanager }}
          RERELEASE_SONSCALE: ${{ inputs.rerelease_sonscale }}
          RERELEASE_WORKSPACETREELOCK: ${{ inputs.rerelease_workspacetreelock }}
          RERELEASE_NOTEBOOK: ${{ inputs.rerelease_notebook }}
          RERELEASE_POSEBROWSER: ${{ inputs.rerelease_posebrowser }}
        run: bash .github/scripts/collect_manual_rerelease_plugins.sh

      - name: Prepare manual rerelease plan
        id: detect
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          AFTER="$(git rev-parse HEAD)"
          BEFORE="$(git rev-parse HEAD~1)"
          bash .github/scripts/detect_plugin_versions.sh \
            "$BEFORE" "$AFTER" "false" "${{ steps.plugins.outputs.plugins }}"

  release:
    needs: [detect, manual-rerelease]
    if: >-
      always() &&
      !cancelled() &&
      (
        (needs.manual-rerelease.result == 'success' && needs.manual-rerelease.outputs.should_release == 'true') ||
        (needs.detect.result == 'success' && needs.detect.outputs.should_release == 'true')
      )
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.set_released.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check existing release for this commit
        id: existing
        run: |
          set -euo pipefail
          TAG="${{ needs.manual-rerelease.outputs.should_release == 'true' && needs.manual-rerelease.outputs.release_tag || needs.detect.outputs.release_tag }}"
          TAG_ENC="$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=""))' "$TAG")"
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG_ENC}")
          if [[ "$CODE" == "200" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (release tag already exists)
        if: steps.existing.outputs.exists == 'true'
        run: echo "Tag ${{ needs.manual-rerelease.outputs.should_release == 'true' && needs.manual-rerelease.outputs.release_tag || needs.detect.outputs.release_tag }} already has a GitHub release; skipping build."

      - name: Setup .NET
        if: steps.existing.outputs.exists != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Generate assembly version props
        if: steps.existing.outputs.exists != 'true'
        run: python3 .github/scripts/generate_plugin_versions_props.py

      - name: Restore and build solution (Release)
        if: steps.existing.outputs.exists != 'true'
        run: |
          set -euo pipefail
          dotnet restore HS2-Sandbox.sln
          dotnet build HS2-Sandbox.sln -c Release --no-incremental

      - name: Stage release files
        if: steps.existing.outputs.exists != 'true'
        id: stage
        run: |
          set -euo pipefail
          mkdir -p release-staging
          IFS=',' read -ra PATHS <<< "${{ needs.manual-rerelease.outputs.should_release == 'true' && needs.manual-rerelease.outputs.asset_paths || needs.detect.outputs.asset_paths }}"
          for rel in "${PATHS[@]}"; do
            [[ -z "${rel// }" ]] && continue
            if [[ ! -f "$rel" ]]; then
              echo "::error::Expected artifact missing: $rel"
              exit 1
            fi
            cp -a "$rel" "release-staging/$(basename "$rel")"
          done

      - name: Create GitHub Release (grouped assets)
        id: publish
        if: steps.existing.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.manual-rerelease.outputs.should_release == 'true' && needs.manual-rerelease.outputs.release_tag || needs.detect.outputs.release_tag }}
          name: ${{ needs.manual-rerelease.outputs.should_release == 'true' && needs.manual-rerelease.outputs.release_name || needs.detect.outputs.release_name }}
          body: |
            ${{ needs.manual-rerelease.outputs.should_release == 'true' && needs.manual-rerelease.outputs.notes || needs.detect.outputs.notes }}

            **Commit:** ${{ github.sha }}
            **Workflow:** ${{ github.run_id }}
          files: release-staging/*
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Set released output
        id: set_released
        if: always()
        run: |
          if [[ "${{ steps.existing.outputs.exists }}" == "true" ]]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.publish.outcome }}" == "success" ]]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  update-readme:
    needs: [detect, manual-rerelease, release]
    if: >-
      always() &&
      !cancelled() &&
      (
        (needs.release.result == 'success' && needs.release.outputs.released == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.update_readme == true)
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Refresh README and versions.json (after release assets exist)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          README_PATH: README.md
        run: |
          python3 .github/scripts/update_readme_downloads.py
          python3 .github/scripts/sync_versions_json.py

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md versions.json
          if git diff --cached --quiet; then
            echo "README.md and versions.json already current."
          else
            git commit -m "chore: sync versions.json and README after release"
            git push
          fi
